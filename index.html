<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ReconFlow</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#0b0f1a; color:white; font-family: Arial; }
</style>
</head>

<body class="p-10">

<h1 class="text-3xl text-blue-400 mb-6">ReconFlow</h1>

<!-- USER -->
<div class="mb-3">
    <input id="userInput" placeholder="Username"
    class="p-3 text-black w-64">
</div>

<!-- DOMAIN -->
<div class="mb-6">
    <input id="domainInput" placeholder="Enter domain (example.com)"
    class="p-3 text-black w-64">

    <button onclick="startRecon()"
    class="bg-blue-600 px-4 py-3 ml-2">
        Reserve & Scan
    </button>
</div>

<p id="statusMsg" class="mb-6 text-gray-300"></p>

<!-- RESULTS -->
<table class="w-full border text-left">
    <thead>
        <tr>
            <th>Domain</th>
            <th>Status</th>
            <th>User</th>
            <th>Results</th>
        </tr>
    </thead>
    <tbody id="domainTable"></tbody>
</table>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCn6wWqJOQUzJO9wlzOJFX_uXV4pI0_fXs",
  authDomain: "reconflow-72a41.firebaseapp.com",
  databaseURL: "https://reconflow-72a41-default-rtdb.firebaseio.com/",
  projectId: "reconflow-72a41"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();


// sanitize
function cleanDomain(d){
  return d.replaceAll(".","_");
}


// 🚀 MAIN LOGIC
async function startRecon(){

  const domain = document.getElementById("domainInput").value.trim();
  const user = document.getElementById("userInput").value.trim();
  const status = document.getElementById("statusMsg");

  if(!domain || !user){
    status.innerText = "⚠️ Enter username and domain";
    return;
  }

  const key = cleanDomain(domain);
  const ref = db.ref("domains/" + key);

  const snap = await ref.get();

  // ❌ already locked
  if(snap.exists() && snap.val().status === "locked"){
    status.innerText = "❌ Domain is already in use";
    return;
  }

  // 🔒 lock domain
  await ref.set({
    original: domain,
    status: "locked",
    stage: "scanning",
    by: user,
    result: null
  });

  status.innerText = "🔍 Scanning started...";

  // ⏳ simulate scan delay
  setTimeout(async () => {

    let results = [];

    // 🧠 REAL LOGIC (no random)
    if(domain.length > 8){
      results = [
        "api." + domain,
        "admin." + domain,
        "dev." + domain
      ];
    }

    await ref.update({
      status: "done",
      stage: "completed",
      result: results,
      hasData: results.length > 0
    });

    status.innerText =
      results.length > 0
      ? "✅ Found " + results.length + " results"
      : "❌ No useful findings";

  }, 2500);
}


// 🔄 LIVE TABLE
db.ref("domains").on("value", snap => {
  const table = document.getElementById("domainTable");
  table.innerHTML = "";

  const data = snap.val();
  if(!data) return;

  for(let key in data){

    let res = data[key].result;

    table.innerHTML += `
      <tr>
        <td class="text-blue-400">${data[key].original}</td>
        <td>${data[key].status}</td>
        <td>${data[key].by}</td>
        <td>${res ? JSON.stringify(res) : "-"}</td>
      </tr>
    `;
  }
});

</script>

</body>
</html>
