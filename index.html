<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReconFlow</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#0b0f1a; color:white; font-family: Arial; }
</style>
</head>

<body class="p-10">

<h1 class="text-4xl mb-6 text-blue-400">ReconFlow</h1>

<!-- INPUT -->
<div class="mb-6">
    <input id="domainInput" placeholder="Enter domain (example.com)" 
    class="p-3 text-black w-64">

    <button onclick="startRecon()" 
    class="bg-blue-600 px-4 py-3 ml-2">
    Reserve
    </button>
</div>

<p id="statusMsg" class="mb-6"></p>

<!-- TABLE -->
<table class="w-full text-left border">
    <thead>
        <tr>
            <th>Domain</th>
            <th>Status</th>
            <th>User</th>
        </tr>
    </thead>
    <tbody id="domainTable"></tbody>
</table>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCn6wWqJOQUzJO9wlzOJFX_uXV4pI0_fXs",
  authDomain: "reconflow-72a41.firebaseapp.com",
  databaseURL: "https://reconflow-72a41-default-rtdb.firebaseio.com/",
  projectId: "reconflow-72a41",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();


// 🚀 Reserve Domain
async function startRecon() {
  const domain = document.getElementById("domainInput").value.trim();
  const status = document.getElementById("statusMsg");

  if (!domain) {
    status.innerText = "⚠️ Enter a domain";
    return;
  }

  const ref = db.ref("domains/" + domain);
  const snapshot = await ref.get();

  if (snapshot.exists()) {
    status.innerText = "❌ Domain already reserved";
    return;
  }

  await ref.set({
    status: "taken",
    by: "jana",
    createdAt: new Date().toISOString()
  });

  status.innerText = "✅ Reserved successfully";
}


// 🔄 Live Update
db.ref("domains").on("value", snapshot => {
  const table = document.getElementById("domainTable");
  table.innerHTML = "";

  const data = snapshot.val();

  if (!data) return;

  for (let domain in data) {
    table.innerHTML += `
      <tr>
        <td class="text-blue-400">${domain}</td>
        <td>${data[domain].status}</td>
        <td>${data[domain].by}</td>
      </tr>
    `;
  }
});
</script>

</body>
</html>
