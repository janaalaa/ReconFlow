<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ReconFlow</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#0b0f1a; color:white; font-family: Arial; }
</style>
</head>

<body class="p-10">

<h1 class="text-3xl text-blue-400 mb-6">ReconFlow</h1>

<!-- USER -->
<div class="mb-4 flex justify-between">
  <p id="userStatus">Loading...</p>
  <button onclick="logout()" class="bg-red-600 px-3 py-2 rounded">Logout</button>
</div>

<!-- INPUTS -->
<div class="mb-4 space-y-2">

    <input id="targetInput" placeholder="Target (google.com)"
    class="p-3 text-black w-72 block">

    <input id="domainInput" placeholder="Domain (api.google.com)"
    class="p-3 text-black w-72 block">

    <select id="statusInput" class="p-3 text-black w-72 block">
        <option value="locked">locked</option>
        <option value="scanning">scanning</option>
        <option value="done">done</option>
    </select>

    <input id="findingsInput" placeholder="Findings (comma separated)"
    class="p-3 text-black w-72 block">

    <button onclick="saveData()"
    class="bg-blue-600 px-4 py-3 rounded">
        Save / Update
    </button>

</div>

<p id="statusMsg" class="mb-6 text-gray-300"></p>

<!-- TABLE -->
<table class="w-full border text-left">
<thead>
<tr>
<th>Target</th>
<th>Domain</th>
<th>Status</th>
<th>User</th>
<th>Findings</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

<script>

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCn6wWqJOQUzJO9wlzOJFX_uXV4pI0_fXs",
  authDomain: "reconflow-72a41.firebaseapp.com",
  databaseURL: "https://reconflow-72a41-default-rtdb.firebaseio.com/",
  projectId: "reconflow-72a41"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const auth = firebase.auth();

let currentUser = null;
let currentUID = null;

// 🔐 AUTH CHECK
auth.onAuthStateChanged(user => {
  if(!user){
    window.location.href = "auth.html";
  } else {
    currentUser = user.email;
    currentUID = user.uid;

    document.getElementById("userStatus").innerText =
      "Logged in: " + currentUser;
  }
});

function logout(){
  auth.signOut();
}

// 🧠 helper
function clean(d){
  return d.replaceAll(".","_");
}

// 🚀 SAVE
async function saveData(){

  const target = document.getElementById("targetInput").value.trim();
  const domain = document.getElementById("domainInput").value.trim();
  const status = document.getElementById("statusInput").value;
  const findings = document.getElementById("findingsInput").value.trim();
  const msg = document.getElementById("statusMsg");

  // ❌ validation
  const domainRegex = /^[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}$/;
  if(!domainRegex.test(domain)){
    msg.innerText = "❌ Invalid domain";
    return;
  }

  if(!target || !domain){
    msg.innerText = "⚠️ Fill required fields";
    return;
  }

  const key = clean(domain);
  const ref = db.ref("data/" + key);

  const snap = await ref.get();

  // 🔒 ownership
  if(snap.exists()){
    const old = snap.val();

    if(old.uid !== currentUID){
      msg.innerText = "❌ Owned by another user";
      return;
    }
  }

  // 🧠 findings logic
  let findingsArray = [];

  if(status === "done" && findings){
    findingsArray = findings.split(",").map(f => f.trim());
  }

  await ref.set({
    target,
    domain,
    status,
    assignedTo: currentUser,
    uid: currentUID,
    findings: findingsArray
  });

  msg.innerText = "✅ Saved";
}


// 🔄 TABLE
db.ref("data").on("value", snap => {

  const table = document.getElementById("table");
  table.innerHTML = "";

  const data = snap.val();
  if(!data) return;

  for(let k in data){

    table.innerHTML += `
      <tr>
        <td class="text-blue-400">${data[k].target}</td>
        <td>${data[k].domain}</td>
        <td>${data[k].status}</td>
        <td>${data[k].assignedTo}</td>

        <td>
          ${
            data[k].status === "done"
              ? (data[k].findings?.length
                  ? data[k].findings.join(", ")
                  : "No findings")
              : "—"
          }
        </td>
      </tr>
    `;
  }
});

</script>

</body>
</html>
