<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ReconFlow</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#0b0f1a; color:white; font-family: Arial; }
</style>
</head>

<body class="p-10">

<h1 class="text-3xl text-blue-400 mb-6">ReconFlow</h1>

<!-- USER INPUT -->
<div class="mb-4 space-y-2">
  <input id="userInput" placeholder="Your username"
  class="p-3 text-black w-72 block">
</div>

<!-- INPUTS -->
<div class="mb-4 space-y-2">

    <input id="targetInput" placeholder="Target (google.com)"
    class="p-3 text-black w-72 block">

    <input id="domainInput" placeholder="Domain (api.google.com)"
    class="p-3 text-black w-72 block">

    <select id="statusInput" class="p-3 text-black w-72 block">
        <option value="locked">locked</option>
        <option value="scanning">scanning</option>
        <option value="done">done</option>
    </select>

    <input id="findingsInput" placeholder="Findings (comma separated)"
    class="p-3 text-black w-72 block">

    <button onclick="saveData()"
    class="bg-blue-600 px-4 py-3 rounded">
        Save / Update
    </button>

</div>

<p id="statusMsg" class="mb-6 text-gray-300"></p>

<!-- TABLE -->
<table class="w-full border text-left">
<thead>
<tr>
<th>Target</th>
<th>Domain</th>
<th>Status</th>
<th>User</th>
<th>Findings</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCn6wWqJOQUzJO9wlzOJFX_uXV4pI0_fXs",
  authDomain: "reconflow-72a41.firebaseapp.com",
  databaseURL: "https://reconflow-72a41-default-rtdb.firebaseio.com/",
  projectId: "reconflow-72a41"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

// 🧠 helper
function clean(d){
  return d.replaceAll(".","_");
}

// 🚀 SAVE
async function saveData(){

  const user = document.getElementById("userInput").value.trim();
  const target = document.getElementById("targetInput").value.trim();
  const domain = document.getElementById("domainInput").value.trim();
  const status = document.getElementById("statusInput").value;
  const findings = document.getElementById("findingsInput").value.trim();
  const msg = document.getElementById("statusMsg");

  if(!user){
    msg.innerText = "❌ Please enter username";
    return;
  }

  const domainRegex = /^[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}$/;
  if(!domainRegex.test(domain)){
    msg.innerText = "❌ Invalid domain";
    return;
  }

  if(!target || !domain){
    msg.innerText = "⚠️ Fill required fields";
    return;
  }

  const key = clean(domain);
  const ref = db.ref("data/" + key);

  let findingsArray = [];

  if(status === "done" && findings){
    findingsArray = findings.split(",").map(f => f.trim());
  }

  await ref.set({
    target,
    domain,
    status,
    assignedTo: user,
    uid: user, // username-based identity
    findings: findingsArray
  });

  msg.innerText = "✅ Saved";
}

// 🗑️ DELETE (only owner username)
async function deleteData(domain, uid){

  const currentUser = document.getElementById("userInput").value.trim();

  if(uid !== currentUser){
    alert("❌ Not allowed");
    return;
  }

  const key = clean(domain);
  await db.ref("data/" + key).remove();
}

// 🔄 TABLE
db.ref("data").on("value", snap => {

  const table = document.getElementById("table");
  table.innerHTML = "";

  const data = snap.val();
  if(!data) return;

  for(let k in data){

    const item = data[k];

    table.innerHTML += `
      <tr>
        <td class="text-blue-400">${item.target}</td>
        <td>${item.domain}</td>
        <td>${item.status}</td>
        <td>${item.assignedTo}</td>

        <td>
          ${
            item.status === "done"
              ? (item.findings?.length
                  ? item.findings.join(", ")
                  : "No findings")
              : "—"
          }
        </td>

        <td>
          <button onclick="deleteData('${item.domain}', '${item.uid}')"
          class="bg-red-600 px-2 py-1 rounded text-xs">
            Delete
          </button>
        </td>
      </tr>
    `;
  }
});

</script>

</body>
</html>
