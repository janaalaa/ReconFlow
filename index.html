<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReconFlow | Centralized Recon Platform</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b0f1a; color: #f8fafc; }
        .mono { font-family: 'Fira Code', monospace; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(59, 130, 246, 0.1); }
        .gradient-text { background: linear-gradient(to right, #3b82f6, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>

<body>

<!-- NAV -->
<nav class="flex justify-between items-center p-6 max-w-6xl mx-auto">
    <div class="text-2xl font-black text-blue-400">Recon<span class="text-white">Flow</span></div>
</nav>

<!-- HERO -->
<header class="text-center py-20 px-4">
    <h1 class="text-5xl font-black mb-6">
        Claim Your <span class="gradient-text">Targets</span>
    </h1>

    <p class="text-gray-400 mb-10">
        Reserve domains and prevent duplication across researchers
    </p>

    <!-- INPUT -->
    <div class="max-w-xl mx-auto">
        <div class="glass p-2 rounded-xl flex">
            <input 
                id="domainInput"
                type="text" 
                placeholder="Enter domain (example.com)" 
                class="flex-1 bg-transparent px-4 py-3 outline-none"
            >

            <button 
                onclick="startRecon()"
                class="bg-blue-600 px-6 py-3 rounded-lg"
            >
                Reserve
            </button>
        </div>
    </div>

    <!-- STATUS -->
    <p id="statusMsg" class="mt-4 text-sm text-gray-400"></p>
</header>

<!-- TABLE -->
<section class="max-w-4xl mx-auto px-4">
    <h2 class="text-xl mb-4">Reserved Domains</h2>

    <table class="w-full text-left mono">
        <thead>
            <tr class="text-gray-400">
                <th>Domain</th>
                <th>Status</th>
                <th>User</th>
            </tr>
        </thead>

        <tbody id="domainTable"></tbody>
    </table>
</section>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCn6wWqJOQUzJO9wlzOJFX_uXV4pI0_fXs",
  authDomain: "reconflow-72a41.firebaseapp.com",
  projectId: "reconflow-72a41",
  storageBucket: "reconflow-72a41.firebasestorage.app",
  messagingSenderId: "58423407895",
  appId: "1:58423407895:web:e98815e74d65ac328fb352"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();


// 🚀 Reserve Domain
async function startRecon() {
    const domain = document.getElementById("domainInput").value.trim();
    const status = document.getElementById("statusMsg");

    if (!domain) {
        status.innerText = "⚠️ Enter a domain";
        return;
    }

    const ref = db.collection("domains").doc(domain);
    const doc = await ref.get();

    if (doc.exists) {
        status.innerText = "❌ Already reserved";
        return;
    }

    await ref.set({
        status: "taken",
        by: "jana",
        createdAt: new Date()
    });

    status.innerText = "✅ Reserved successfully";
}


// 🔄 Live Update Table
db.collection("domains").onSnapshot(snapshot => {
    const table = document.getElementById("domainTable");
    table.innerHTML = "";

    snapshot.forEach(doc => {
        const data = doc.data();

        table.innerHTML += `
            <tr>
                <td class="py-2 text-blue-400">${doc.id}</td>
                <td class="py-2 text-green-400">${data.status}</td>
                <td class="py-2">${data.by}</td>
            </tr>
        `;
    });
});
</script>

</body>
</html>
