<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ReconFlow</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#0b0f1a; color:white; font-family: Arial; }
</style>
</head>

<body class="p-10">

<h1 class="text-3xl text-blue-400 mb-6">ReconFlow</h1>

<!-- AUTH -->
<div class="mb-6 space-x-2">
    <button onclick="register()" class="bg-green-600 px-3 py-2 rounded">Register</button>
    <button onclick="login()" class="bg-yellow-500 px-3 py-2 rounded">Login</button>
    <button onclick="logout()" class="bg-red-600 px-3 py-2 rounded">Logout</button>
</div>

<p id="userStatus" class="mb-6 text-gray-300">Not logged in</p>

<!-- INPUTS -->
<div class="mb-4 space-y-2">

    <input id="targetInput" placeholder="Target (e.g. google.com)"
    class="p-3 text-black w-72 block">

    <input id="domainInput" placeholder="Domain (e.g. api.google.com)"
    class="p-3 text-black w-72 block">

    <select id="statusInput" class="p-3 text-black w-72 block">
        <option value="locked">locked</option>
        <option value="scanning">scanning</option>
        <option value="done">done</option>
    </select>

    <input id="findingsInput" placeholder="Findings (comma separated)"
    class="p-3 text-black w-72 block">

    <button onclick="saveData()"
    class="bg-blue-600 px-4 py-3 rounded">
        Save / Update
    </button>

</div>

<p id="statusMsg" class="mb-6 text-gray-300"></p>

<!-- TABLE -->
<table class="w-full border text-left">
    <thead>
        <tr>
            <th>Target</th>
            <th>Domain</th>
            <th>Status</th>
            <th>Assigned To</th>
            <th>Findings</th>
        </tr>
    </thead>
    <tbody id="table"></tbody>
</table>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

<script>

// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyCn6wWqJOQUzJO9wlzOJFX_uXV4pI0_fXs",
  authDomain: "reconflow-72a41.firebaseapp.com",
  databaseURL: "https://reconflow-72a41-default-rtdb.firebaseio.com/",
  projectId: "reconflow-72a41"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const auth = firebase.auth();

let currentUser = null;


// 🔐 AUTH SYSTEM

async function register(){
  const email = prompt("Enter email");
  const password = prompt("Enter password");

  try{
    await auth.createUserWithEmailAndPassword(email, password);
    alert("User created");
  }catch(e){
    alert(e.message);
  }
}

async function login(){
  const email = prompt("Email");
  const password = prompt("Password");

  try{
    await auth.signInWithEmailAndPassword(email, password);
  }catch(e){
    alert(e.message);
  }
}

function logout(){
  auth.signOut();
}

auth.onAuthStateChanged(user => {
  const status = document.getElementById("userStatus");

  if(user){
    currentUser = user.email;
    status.innerText = "Logged in as: " + currentUser;
  }else{
    currentUser = null;
    status.innerText = "Not logged in";
  }
});


// 🧠 HELPER
function clean(domain){
  return domain.replaceAll(".","_");
}


// 🚀 SAVE DATA (WITH SECURITY LOGIC)

async function saveData(){

  const target = document.getElementById("targetInput").value.trim();
  const domain = document.getElementById("domainInput").value.trim();
  const status = document.getElementById("statusInput").value;
  const findings = document.getElementById("findingsInput").value.trim();
  const msg = document.getElementById("statusMsg");

  if(!currentUser){
    msg.innerText = "❌ Please login first";
    return;
  }

  if(!target || !domain){
    msg.innerText = "⚠️ Fill target and domain";
    return;
  }

  const key = clean(domain);
  const ref = db.ref("data/" + key);

  const snapshot = await ref.get();

  // 🔒 ownership check
  if(snapshot.exists()){
    const existing = snapshot.val();

    if(existing.assignedTo !== currentUser){
      msg.innerText = "❌ This domain is owned by " + existing.assignedTo;
      return;
    }
  }

  // 🧠 findings logic
  let findingsArray = [];

  if(status === "done" && findings){
    findingsArray = findings.split(",").map(f => f.trim());
  }

  if(status !== "done"){
    findingsArray = [];
  }

  await ref.set({
    target: target,
    domain: domain,
    status: status,
    assignedTo: currentUser,
    findings: findingsArray
  });

  msg.innerText = "✅ Saved successfully";
}


// 🔄 LIVE TABLE

db.ref("data").on("value", snap => {

  const table = document.getElementById("table");
  table.innerHTML = "";

  const data = snap.val();
  if(!data) return;

  for(let k in data){

    table.innerHTML += `
      <tr>
        <td class="text-blue-400">${data[k].target}</td>
        <td>${data[k].domain}</td>
        <td>${data[k].status}</td>
        <td>${data[k].assignedTo}</td>

        <td>
          ${
            data[k].status === "done"
              ? (data[k].findings?.length
                  ? data[k].findings.map(f => "✔ " + f).join("<br>")
                  : "No findings")
              : "—"
          }
        </td>
      </tr>
    `;
  }
});

</script>

</body>
</html>
