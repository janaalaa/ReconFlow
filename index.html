<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ReconFlow</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#0b0f1a; color:white; font-family: Arial; }
</style>
</head>

<body class="p-10">

<h1 class="text-3xl text-blue-400 mb-6">ReconFlow</h1>

<!-- USER INPUT -->
<div class="mb-3">
    <input id="userInput" placeholder="Your name"
    class="p-3 text-black w-64">
</div>

<!-- DOMAIN INPUT -->
<div class="mb-6">
    <input id="domainInput" placeholder="Enter domain (example.com)"
    class="p-3 text-black w-64">

    <button onclick="startRecon()"
    class="bg-blue-600 px-4 py-3 ml-2">
        Reserve
    </button>
</div>

<p id="statusMsg" class="mb-6 text-gray-300"></p>

<!-- TABLE -->
<table class="w-full border text-left">
    <thead>
        <tr>
            <th>Domain</th>
            <th>Status</th>
            <th>User</th>
        </tr>
    </thead>
    <tbody id="domainTable"></tbody>
</table>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCn6wWqJOQUzJO9wlzOJFX_uXV4pI0_fXs",
  authDomain: "reconflow-72a41.firebaseapp.com",
  databaseURL: "https://reconflow-72a41-default-rtdb.firebaseio.com/",
  projectId: "reconflow-72a41"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();


// 🔥 Fix domain for Firebase path
function cleanDomain(domain) {
  return domain.replaceAll(".", "_");
}


// 🚀 Reserve function
async function startRecon() {
  const domain = document.getElementById("domainInput").value.trim();
  const user = document.getElementById("userInput").value.trim();
  const status = document.getElementById("statusMsg");

  if (!domain) {
    status.innerText = "⚠️ Enter a domain";
    return;
  }

  const safeDomain = cleanDomain(domain);

  const ref = db.ref("domains/" + safeDomain);
  const snapshot = await ref.get();

  if (snapshot.exists()) {
    status.innerText = "❌ Already reserved";
    return;
  }

  await ref.set({
    original: domain,
    status: "taken",
    by: user || "anonymous",
    createdAt: new Date().toISOString()
  });

  status.innerText = "✅ Reserved successfully";
}


// 🔄 Live table update
db.ref("domains").on("value", snapshot => {
  const table = document.getElementById("domainTable");
  table.innerHTML = "";

  const data = snapshot.val();
  if (!data) return;

  for (let key in data) {
    table.innerHTML += `
      <tr>
        <td class="text-blue-400">${data[key].original}</td>
        <td>${data[key].status}</td>
        <td>${data[key].by}</td>
      </tr>
    `;
  }
});

</script>

</body>
</html>
