<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ReconFlow</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#0b0f1a; color:white; font-family: Arial; }
</style>
</head>

<body class="p-10">

<h1 class="text-3xl text-blue-400 mb-6">ReconFlow</h1>

<!-- INPUTS -->
<div class="mb-3 space-y-2">

    <input id="targetInput" placeholder="Target (e.g. google.com)"
    class="p-3 text-black w-64 block">

    <input id="domainInput" placeholder="Domain (e.g. api.google.com)"
    class="p-3 text-black w-64 block">

    <input id="userInput" placeholder="Assigned user"
    class="p-3 text-black w-64 block">

    <select id="statusInput" class="p-3 text-black w-64 block">
        <option value="locked">locked</option>
        <option value="scanning">scanning</option>
        <option value="done">done</option>
    </select>

    <button onclick="addEntry()"
    class="bg-blue-600 px-4 py-3">
        Save / Update
    </button>

</div>

<p id="statusMsg" class="mb-6 text-gray-300"></p>

<!-- TABLE -->
<table class="w-full border text-left">
    <thead>
        <tr>
            <th>Target</th>
            <th>Domain</th>
            <th>Status</th>
            <th>Assigned To</th>
            <th>Result</th>
        </tr>
    </thead>
    <tbody id="table"></tbody>
</table>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCn6wWqJOQUzJO9wlzOJFX_uXV4pI0_fXs",
  authDomain: "reconflow-72a41.firebaseapp.com",
  databaseURL: "https://reconflow-72a41-default-rtdb.firebaseio.com/",
  projectId: "reconflow-72a41"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function clean(d){
  return d.replaceAll(".","_");
}


// 🚀 ADD / UPDATE ENTRY
async function addEntry(){

  const target = document.getElementById("targetInput").value.trim();
  const domain = document.getElementById("domainInput").value.trim();
  const user = document.getElementById("userInput").value.trim();
  const status = document.getElementById("statusInput").value;
  const msg = document.getElementById("statusMsg");

  if(!target || !domain || !user){
    msg.innerText = "⚠️ Fill all fields";
    return;
  }

  const key = clean(domain);
  const ref = db.ref("data/" + key);

  let result = [];

  // 🧠 logic based on status
  if(status === "done"){
    if(domain.length > 8){
      result = [
        "api." + domain,
        "admin." + domain,
        "dev." + domain
      ];
    }
  }

  await ref.set({
    target: target,
    domain: domain,
    status: status,
    assignedTo: user,
    result: result
  });

  msg.innerText = "✅ Saved successfully";
}


// 🔄 LIVE TABLE
db.ref("data").on("value", snap => {

  const table = document.getElementById("table");
  table.innerHTML = "";

  const data = snap.val();
  if(!data) return;

  for(let k in data){

    table.innerHTML += `
      <tr>
        <td class="text-blue-400">${data[k].target}</td>
        <td>${data[k].domain}</td>
        <td>${data[k].status}</td>
        <td>${data[k].assignedTo}</td>
        <td>${data[k].result ? JSON.stringify(data[k].result) : "[]"}</td>
      </tr>
    `;
  }
});

</script>

</body>
</html>
