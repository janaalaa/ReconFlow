<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ReconFlow</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { background:#0b0f1a; color:white; font-family: Arial; }
</style>
</head>

<body class="p-10">

<h1 class="text-3xl text-blue-400 mb-6">ReconFlow</h1>

<!-- AUTH -->
<div class="mb-6 space-x-2">
    <button onclick="register()" class="bg-green-600 px-3 py-2 rounded">Register</button>
    <button onclick="login()" class="bg-yellow-500 px-3 py-2 rounded">Login</button>
    <button onclick="logout()" class="bg-red-600 px-3 py-2 rounded">Logout</button>
</div>

<p id="userStatus" class="mb-6 text-gray-300">Not logged in</p>

<!-- INPUT -->
<div class="mb-4 space-y-2">

    <input id="targetInput" placeholder="Target (google.com)"
    class="p-3 text-black w-72 block">

    <input id="domainInput" placeholder="Domain (api.google.com)"
    class="p-3 text-black w-72 block">

    <input id="findingsInput" placeholder="Findings (comma separated)"
    class="p-3 text-black w-72 block">

    <button onclick="saveData()"
    class="bg-blue-600 px-4 py-3 rounded">
        Start / Update
    </button>

</div>

<p id="statusMsg" class="mb-6 text-gray-300"></p>

<!-- TABLE -->
<table class="w-full border text-left mb-10">
<thead>
<tr>
<th>Target</th>
<th>Domain</th>
<th>Status</th>
<th>User</th>
<th>Findings</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<!-- ACTIVITY LOG -->
<h2 class="text-xl text-emerald-400 mb-3">Activity Log</h2>
<ul id="activity" class="text-sm space-y-1"></ul>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

<script>

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCn6...",
  authDomain: "reconflow-72a41.firebaseapp.com",
  databaseURL: "https://reconflow-72a41-default-rtdb.firebaseio.com/",
  projectId: "reconflow-72a41"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const auth = firebase.auth();

let currentUser = null;

// 🔐 AUTH
auth.onAuthStateChanged(user => {
  const el = document.getElementById("userStatus");
  if(user){
    currentUser = user.email;
    el.innerText = "Logged in: " + currentUser;
  }else{
    currentUser = null;
    el.innerText = "Not logged in";
  }
});

function register(){
  const email = prompt("Email");
  const pass = prompt("Password");
  auth.createUserWithEmailAndPassword(email, pass);
}

function login(){
  const email = prompt("Email");
  const pass = prompt("Password");
  auth.signInWithEmailAndPassword(email, pass);
}

function logout(){
  auth.signOut();
}

// 🧠 HELPERS
function clean(d){
  return d.replaceAll(".", "_");
}

// 🚀 CORE LOGIC
async function saveData(){

  const target = document.getElementById("targetInput").value.trim();
  const domain = document.getElementById("domainInput").value.trim();
  const findings = document.getElementById("findingsInput").value.trim();
  const msg = document.getElementById("statusMsg");

  // ❌ login check
  if(!currentUser){
    msg.innerText = "❌ login first";
    return;
  }

  // ❌ validation
  const domainRegex = /^[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}$/;
  if(!domainRegex.test(domain)){
    msg.innerText = "❌ invalid domain";
    return;
  }

  const key = clean(domain);
  const ref = db.ref("data/" + key);

  const snap = await ref.get();

  let newStatus = "locked";
  let findingsArray = [];

  // 🧠 STATUS FLOW
  if(!snap.exists()){
    newStatus = "locked";
  }else{
    const old = snap.val();

    if(old.assignedTo !== currentUser){
      msg.innerText = "❌ owned by " + old.assignedTo;
      return;
    }

    if(old.status === "locked"){
      newStatus = "scanning";
    }
    else if(old.status === "scanning"){
      newStatus = "done";
    }
    else{
      newStatus = "done";
    }
  }

  // 📦 findings only if done
  if(newStatus === "done" && findings){
    findingsArray = findings.split(",").map(f => f.trim());
  }

  // 💾 save
  await ref.set({
    target,
    domain,
    status: newStatus,
    assignedTo: currentUser,
    findings: findingsArray,
    updatedAt: Date.now()
  });

  // 📝 activity log
  await db.ref("activity").push({
    user: currentUser,
    domain: domain,
    status: newStatus,
    time: new Date().toLocaleString()
  });

  msg.innerText = "✅ " + newStatus;
}


// 🔄 TABLE
db.ref("data").on("value", snap => {

  const table = document.getElementById("table");
  table.innerHTML = "";

  const data = snap.val();
  if(!data) return;

  for(let k in data){
    table.innerHTML += `
    <tr>
      <td>${data[k].target}</td>
      <td>${data[k].domain}</td>
      <td>${data[k].status}</td>
      <td>${data[k].assignedTo}</td>
      <td>
        ${
          data[k].status === "done"
          ? (data[k].findings?.join(", ") || "No findings")
          : "—"
        }
      </td>
    </tr>`;
  }
});

// 🔄 ACTIVITY
db.ref("activity").limitToLast(10).on("value", snap => {

  const list = document.getElementById("activity");
  list.innerHTML = "";

  const data = snap.val();
  if(!data) return;

  Object.values(data).reverse().forEach(a => {
    list.innerHTML += `<li>👤 ${a.user} → ${a.domain} (${a.status}) @ ${a.time}</li>`;
  });
});

</script>

</body>
</html>
