<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ReconFlow Auth</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: #0b0f1a;
  color: white;
  font-family: Arial;
}
</style>
</head>

<body class="flex items-center justify-center h-screen">

<div class="bg-gray-900 p-8 rounded-xl w-96 shadow-xl">

<h2 class="text-2xl font-bold mb-6 text-center text-blue-400">
ReconFlow Login
</h2>

<input id="email" type="email" placeholder="Email"
class="w-full p-3 mb-3 text-black rounded">

<input id="password" type="password" placeholder="Password"
class="w-full p-3 mb-4 text-black rounded">

<button onclick="login()"
class="w-full bg-blue-600 py-3 rounded mb-2">
Login
</button>

<button onclick="register()"
class="w-full bg-green-600 py-3 rounded">
Register
</button>

<p id="msg" class="mt-4 text-sm text-center text-gray-300"></p>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "reconflow-72a41.firebaseapp.com",
  projectId: "reconflow-72a41"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

const msg = document.getElementById("msg");

// 🔐 LOGIN
async function login(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  try{
    await auth.signInWithEmailAndPassword(email, pass);
    window.location.href = "index.html";
  }catch(e){
    msg.innerText = e.message;
  }
}

// 🆕 REGISTER
async function register(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  try{
    await auth.createUserWithEmailAndPassword(email, pass);
    msg.innerText = "Account created ✔ Login now";
  }catch(e){
    msg.innerText = e.message;
  }
}

// 🔁 auto redirect if already logged in
auth.onAuthStateChanged(user => {
  if(user){
    window.location.href = "index.html";
  }
});

</script>

</body>
</html>
